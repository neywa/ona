<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- Primary meta -->
  <meta name="description" content="OpenShift community intelligence — news, CVE alerts, release tracking and AI-powered daily briefings for SREs and DevOps engineers." />

  <!-- Open Graph (Slack, LinkedIn, Facebook previews) -->
  <meta property="og:title" content="ShiftFeed" />
  <meta property="og:description" content="OpenShift community intelligence — news, CVE alerts, release tracking and AI-powered daily briefings for SREs and DevOps engineers." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://neywa.github.io/shiftfeed/" />
  <meta property="og:image" content="https://neywa.github.io/shiftfeed/icons/Icon-512.png" />
  <meta property="og:site_name" content="ShiftFeed" />

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ShiftFeed" />
  <meta name="twitter:description" content="OpenShift community intelligence — news, CVE alerts, release tracking and AI-powered daily briefings for SREs and DevOps engineers." />
  <meta name="twitter:image" content="https://neywa.github.io/shiftfeed/icons/Icon-512.png" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ona">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ShiftFeed</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
